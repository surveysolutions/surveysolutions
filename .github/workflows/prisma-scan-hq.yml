name: Prisma Cloud Scan — Headquarters Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prisma-scan:
    name: Prisma Cloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Resolve image tag from branch name
        id: image
        run: |
          # Replicate the tag escaping from .build.ps1 Get-DockerTags / EscapedBranchName
          branch="${{ github.ref_name }}"
          tag="${branch}"
          # Remove KP ticket prefixes, underscores, plus signs
          tag=$(echo "$tag" | sed -E 's/([Kk][Pp]-?[0-9]+)|_|\+//g')
          # Replace slashes and backslashes with dashes
          tag=$(echo "$tag" | tr '/\\' '-')
          # Strip leading non-alphanumeric characters
          tag=$(echo "$tag" | sed -E 's/^[^[:alnum:]]*//')
          # Truncate to 128 characters
          tag="${tag:0:128}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/headquarters:${tag}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${IMAGE}"

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Headquarters image
        run: docker pull "${{ steps.image.outputs.name }}"

      - name: Download twistcli
        # twistcli is downloaded from the console so its version always matches the server.
        # Access Key ID is used as the username, Secret Key as the password (Enterprise Edition).
        run: |
          curl --silent --show-error --fail \
            -u "${{ secrets.PCC_USER }}:${{ secrets.PCC_PASS }}" \
            --output ./twistcli \
            "${{ secrets.PCC_CONSOLE_URL }}/api/v1/util/twistcli"
          chmod +x ./twistcli

      - name: Scan image with twistcli
        # Exit code 1 means either policy violation or twistcli error — both are treated as failure.
        run: |
          ./twistcli images scan \
            --address "${{ secrets.PCC_CONSOLE_URL }}" \
            --user "${{ secrets.PCC_USER }}" \
            --password "${{ secrets.PCC_PASS }}" \
            --details \
            --output-file pcc_scan_results.json \
            "${{ steps.image.outputs.name }}"

      - name: Generate human-readable report
        if: ${{ !cancelled() }}
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          SCAN_TIME=$(jq -r '.results[0].scanTime // "unknown"' pcc_scan_results.json)
          CONSOLE_URL=$(jq -r '.consoleURL // ""' pcc_scan_results.json)

          VULN_PASS=$(jq -r '.results[0].vulnerabilitiesScanPassed' pcc_scan_results.json)
          COMP_PASS=$(jq -r '.results[0].complianceScanPassed' pcc_scan_results.json)

          VCRIT=$(jq -r '.results[0].vulnerabilityDistribution.critical // 0' pcc_scan_results.json)
          VHIGH=$(jq -r '.results[0].vulnerabilityDistribution.high    // 0' pcc_scan_results.json)
          VMED=$(jq -r  '.results[0].vulnerabilityDistribution.medium  // 0' pcc_scan_results.json)
          VLOW=$(jq -r  '.results[0].vulnerabilityDistribution.low     // 0' pcc_scan_results.json)
          VTOT=$(jq -r  '.results[0].vulnerabilityDistribution.total   // 0' pcc_scan_results.json)

          CCRIT=$(jq -r '.results[0].complianceDistribution.critical // 0' pcc_scan_results.json)
          CHIGH=$(jq -r '.results[0].complianceDistribution.high    // 0' pcc_scan_results.json)
          CMED=$(jq -r  '.results[0].complianceDistribution.medium  // 0' pcc_scan_results.json)
          CLOW=$(jq -r  '.results[0].complianceDistribution.low     // 0' pcc_scan_results.json)
          CTOT=$(jq -r  '.results[0].complianceDistribution.total   // 0' pcc_scan_results.json)

          {
            echo "# Prisma Cloud Scan Report"
            echo ""
            echo "| Field        | Value |"
            echo "|---|---|"
            echo "| **Image**    | \`${IMAGE}\` |"
            echo "| **Branch**   | \`${{ github.ref_name }}\` |"
            echo "| **Scan time**| ${SCAN_TIME} |"
            echo "| **Run**      | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [ -n "$CONSOLE_URL" ] && [ "$CONSOLE_URL" != "null" ]; then
              echo "| **Console**  | [View in Prisma Cloud](${CONSOLE_URL}) |"
            fi
            echo ""

            if [ "$VULN_PASS" = "true" ]; then
              echo "## Vulnerabilities — PASSED ✅"
            else
              echo "## Vulnerabilities — FAILED ❌"
            fi
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${VCRIT} |"
            echo "| 🟠 High     | ${VHIGH} |"
            echo "| 🟡 Medium   | ${VMED}  |"
            echo "| 🔵 Low      | ${VLOW}  |"
            echo "| **Total**   | **${VTOT}** |"
            echo ""

            if [ "$COMP_PASS" = "true" ]; then
              echo "## Compliance — PASSED ✅"
            else
              echo "## Compliance — FAILED ❌"
            fi
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${CCRIT} |"
            echo "| 🟠 High     | ${CHIGH} |"
            echo "| 🟡 Medium   | ${CMED}  |"
            echo "| 🔵 Low      | ${CLOW}  |"
            echo "| **Total**   | **${CTOT}** |"
            echo ""

            VULN_COUNT=$(jq '.results[0].vulnerabilities | length' pcc_scan_results.json)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "## Vulnerability Details"
              echo ""
              echo "| CVE | Severity | Package | Version | Status | Fix available |"
              echo "|---|---|---|---|---|---|"
              jq -r '
                .results[0].vulnerabilities[]
                | [.id, .severity, .packageName, .packageVersion, .status,
                   (if .fixedDate != null and .fixedDate != "" then "Yes" else "No" end)]
                | @tsv
              ' pcc_scan_results.json | sort -t$'\t' -k2,2r | \
              while IFS=$'\t' read -r cve sev pkg ver stat fix; do
                echo "| ${cve} | ${sev} | ${pkg} | ${ver} | ${stat} | ${fix} |"
              done
              echo ""
            fi

            COMP_COUNT=$(jq '.results[0].compliances | length' pcc_scan_results.json)
            if [ "$COMP_COUNT" -gt 0 ]; then
              echo "## Compliance Issues"
              echo ""
              echo "| ID | Severity | Title |"
              echo "|---|---|---|"
              jq -r '
                .results[0].compliances[]
                | [(.id | tostring), .severity, .title]
                | @tsv
              ' pcc_scan_results.json | sort -t$'\t' -k2,2r | \
              while IFS=$'\t' read -r id sev title; do
                echo "| ${id} | ${sev} | ${title} |"
              done
              echo ""
            fi
          } | tee scan_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-cloud-scan-results
          path: |
            scan_report.md
            pcc_scan_results.json
          retention-days: 30
