name: Prisma Cloud Scan — Headquarters Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prisma-scan:
    name: Prisma Cloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: '[1/8] Resolve image tag from branch name'
        id: image
        run: |
          # Replicate the tag escaping from .build.ps1 Get-DockerTags / EscapedBranchName
          branch="${{ github.ref_name }}"
          tag="${branch}"
          # Remove KP ticket prefixes, underscores, plus signs
          tag=$(echo "$tag" | sed -E 's/([Kk][Pp]-?[0-9]+)|_|\+//g')
          # Replace slashes and backslashes with dashes
          tag=$(echo "$tag" | tr '/\\' '-')
          # Strip leading non-alphanumeric characters
          tag=$(echo "$tag" | sed -E 's/^[^[:alnum:]]*//')
          # Truncate to 128 characters
          tag="${tag:0:128}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/headquarters:${tag}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${IMAGE}"

      - name: '[2/8] Log in to the GitHub Container Registry'
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: '[3/8] Pull Headquarters image'
        run: docker pull "${{ steps.image.outputs.name }}"

      - name: '[4/8] Download twistcli'
        # twistcli is downloaded from the console so its version always matches the server.
        # Access Key ID is used as the username, Secret Key as the password (Enterprise Edition).
        run: |
          curl --silent --show-error --fail \
            -u "${{ secrets.PCC_USER }}:${{ secrets.PCC_PASS }}" \
            --output ./twistcli \
            "${{ secrets.PCC_CONSOLE_URL }}/api/v1/util/twistcli"
          chmod +x ./twistcli

      - name: '[5/8] Scan image with twistcli'
        # Exit code 1 means either policy violation or twistcli error — both are treated as failure.
        # tee writes stdout both to the log and to twistcli_output.txt for the artifact.
        env:
          NO_COLOR: "1"
        run: |
          ./twistcli images scan \
            --address "${{ secrets.PCC_CONSOLE_URL }}" \
            --user "${{ secrets.PCC_USER }}" \
            --password "${{ secrets.PCC_PASS }}" \
            --details \
            --output-file pcc_scan_results.json \
            "${{ steps.image.outputs.name }}" \
          | tee twistcli_output.txt; exit "${PIPESTATUS[0]}"

      - name: '[6/8] Generate human-readable report'
        if: ${{ !cancelled() }}
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          SCAN_TIME=$(jq -r '.results[0].scanTime // "unknown"' pcc_scan_results.json)
          CONSOLE_URL=$(jq -r '.consoleURL // ""' pcc_scan_results.json)

          VULN_PASS=$(jq -r '.results[0].vulnerabilitiesScanPassed' pcc_scan_results.json)
          COMP_PASS=$(jq -r '.results[0].complianceScanPassed' pcc_scan_results.json)

          VCRIT=$(jq -r '.results[0].vulnerabilityDistribution.critical // 0' pcc_scan_results.json)
          VHIGH=$(jq -r '.results[0].vulnerabilityDistribution.high    // 0' pcc_scan_results.json)
          VMED=$(jq -r  '.results[0].vulnerabilityDistribution.medium  // 0' pcc_scan_results.json)
          VLOW=$(jq -r  '.results[0].vulnerabilityDistribution.low     // 0' pcc_scan_results.json)
          VTOT=$(jq -r  '.results[0].vulnerabilityDistribution.total   // 0' pcc_scan_results.json)

          CCRIT=$(jq -r '.results[0].complianceDistribution.critical // 0' pcc_scan_results.json)
          CHIGH=$(jq -r '.results[0].complianceDistribution.high    // 0' pcc_scan_results.json)
          CMED=$(jq -r  '.results[0].complianceDistribution.medium  // 0' pcc_scan_results.json)
          CLOW=$(jq -r  '.results[0].complianceDistribution.low     // 0' pcc_scan_results.json)
          CTOT=$(jq -r  '.results[0].complianceDistribution.total   // 0' pcc_scan_results.json)

          {
            echo "# Prisma Cloud Scan Report"
            echo ""
            echo "| Field        | Value |"
            echo "|---|---|"
            echo "| **Image**    | \`${IMAGE}\` |"
            echo "| **Branch**   | \`${{ github.ref_name }}\` |"
            echo "| **Scan time**| ${SCAN_TIME} |"
            echo "| **Run**      | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [ -n "$CONSOLE_URL" ] && [ "$CONSOLE_URL" != "null" ]; then
              echo "| **Console**  | [View in Prisma Cloud](${CONSOLE_URL}) |"
            fi
            echo ""

            if [ "$VULN_PASS" = "true" ]; then
              echo "## Vulnerabilities — PASSED ✅"
            else
              echo "## Vulnerabilities — FAILED ❌"
            fi
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${VCRIT} |"
            echo "| 🟠 High     | ${VHIGH} |"
            echo "| 🟡 Medium   | ${VMED}  |"
            echo "| 🔵 Low      | ${VLOW}  |"
            echo "| **Total**   | **${VTOT}** |"
            echo ""

            if [ "$COMP_PASS" = "true" ]; then
              echo "## Compliance — PASSED ✅"
            else
              echo "## Compliance — FAILED ❌"
            fi
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${CCRIT} |"
            echo "| 🟠 High     | ${CHIGH} |"
            echo "| 🟡 Medium   | ${CMED}  |"
            echo "| 🔵 Low      | ${CLOW}  |"
            echo "| **Total**   | **${CTOT}** |"
            echo ""

            VULN_COUNT=$(jq '.results[0].vulnerabilities | length' pcc_scan_results.json)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "## Vulnerability Details"
              echo ""
              echo "| CVE | Severity | Package | Version | Status | Fix available |"
              echo "|---|---|---|---|---|---|"
              jq -r '
                .results[0].vulnerabilities[]
                | [.id, .severity, .packageName, .packageVersion, .status,
                   (if .fixedDate != null and .fixedDate != "" then "Yes" else "No" end)]
                | @tsv
              ' pcc_scan_results.json | sort -t$'\t' -k2,2r | \
              while IFS=$'\t' read -r cve sev pkg ver stat fix; do
                echo "| ${cve} | ${sev} | ${pkg} | ${ver} | ${stat} | ${fix} |"
              done
              echo ""
            fi

            COMP_COUNT=$(jq '.results[0].compliances | length' pcc_scan_results.json)
            if [ "$COMP_COUNT" -gt 0 ]; then
              echo "## Compliance Issues"
              echo ""
              echo "| ID | Severity | Title |"
              echo "|---|---|---|"
              jq -r '
                .results[0].compliances[]
                | [(.id | tostring), .severity, .title]
                | @tsv
              ' pcc_scan_results.json | sort -t$'\t' -k2,2r | \
              while IFS=$'\t' read -r id sev title; do
                echo "| ${id} | ${sev} | ${title} |"
              done
              echo ""
            fi
          } | tee scan_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: '[7/8] Generate HTML report'
        if: ${{ !cancelled() }}
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          SCAN_TIME=$(jq -r '.results[0].scanTime // "unknown"' pcc_scan_results.json)
          CONSOLE_URL=$(jq -r '.consoleURL // ""' pcc_scan_results.json)
          VULN_PASS=$(jq -r '.results[0].vulnerabilitiesScanPassed' pcc_scan_results.json)
          COMP_PASS=$(jq -r '.results[0].complianceScanPassed' pcc_scan_results.json)
          VCRIT=$(jq -r '.results[0].vulnerabilityDistribution.critical // 0' pcc_scan_results.json)
          VHIGH=$(jq -r '.results[0].vulnerabilityDistribution.high    // 0' pcc_scan_results.json)
          VMED=$(jq -r  '.results[0].vulnerabilityDistribution.medium  // 0' pcc_scan_results.json)
          VLOW=$(jq -r  '.results[0].vulnerabilityDistribution.low     // 0' pcc_scan_results.json)
          VTOT=$(jq -r  '.results[0].vulnerabilityDistribution.total   // 0' pcc_scan_results.json)
          CCRIT=$(jq -r '.results[0].complianceDistribution.critical // 0' pcc_scan_results.json)
          CHIGH=$(jq -r '.results[0].complianceDistribution.high    // 0' pcc_scan_results.json)
          CMED=$(jq -r  '.results[0].complianceDistribution.medium  // 0' pcc_scan_results.json)
          CLOW=$(jq -r  '.results[0].complianceDistribution.low     // 0' pcc_scan_results.json)
          CTOT=$(jq -r  '.results[0].complianceDistribution.total   // 0' pcc_scan_results.json)

          if [ "$VULN_PASS" = "true" ]; then VULN_BADGE='<span class="badge pass">PASSED</span>'; else VULN_BADGE='<span class="badge fail">FAILED</span>'; fi
          if [ "$COMP_PASS" = "true" ]; then COMP_BADGE='<span class="badge pass">PASSED</span>'; else COMP_BADGE='<span class="badge fail">FAILED</span>'; fi
          if [ -n "$CONSOLE_URL" ] && [ "$CONSOLE_URL" != "null" ]; then CONSOLE_LINK="<a href=\"${CONSOLE_URL}\" target=\"_blank\">View in Prisma Cloud →</a>"; else CONSOLE_LINK="—"; fi

          VULN_ROWS=$(jq -r '
            .results[0].vulnerabilities[]
            | "<tr class=\"sev-\(.severity)\">"
              + "<td><a href=\"https://nvd.nist.gov/vuln/detail/\(.id)\" target=\"_blank\">\(.id)</a></td>"
              + "<td><span class=\"sev \(.severity)\">\(.severity)</span></td>"
              + "<td>\(.packageName)</td>"
              + "<td>\(.packageVersion)</td>"
              + "<td>\(.status // "—")</td>"
              + "<td>\(if .fixedDate != null and .fixedDate != "" then "✔ Yes" else "—" end)</td>"
              + "<td class=\"desc\">\(.description // "" | .[0:120])…</td>"
              + "</tr>"
          ' pcc_scan_results.json 2>/dev/null || echo "")

          COMP_ROWS=$(jq -r '
            .results[0].compliances[]
            | "<tr class=\"sev-\(.severity)\">"
              + "<td>\(.id)</td>"
              + "<td><span class=\"sev \(.severity)\">\(.severity)</span></td>"
              + "<td>\(.title // "—")</td>"
              + "<td class=\"desc\">\(.description // "" | .[0:160])…</td>"
              + "</tr>"
          ' pcc_scan_results.json 2>/dev/null || echo "")

          cat > scan_report.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>Prisma Cloud Scan — Headquarters</title>
          <style>
            *, *::before, *::after { box-sizing: border-box; }
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                   margin: 0; padding: 24px; background: #0d1117; color: #c9d1d9; font-size: 14px; }
            h1 { font-size: 22px; color: #e6edf3; margin: 0 0 4px; }
            h2 { font-size: 16px; color: #e6edf3; margin: 32px 0 12px; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
            .meta { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
            .meta a { color: #58a6ff; text-decoration: none; }
            .cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
            .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                    padding: 16px 24px; min-width: 140px; text-align: center; }
            .card .num { font-size: 32px; font-weight: 700; line-height: 1.1; }
            .card .label { font-size: 12px; color: #8b949e; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
            .num.critical { color: #f85149; }
            .num.high     { color: #e3b341; }
            .num.medium   { color: #d29922; }
            .num.low      { color: #388bfd; }
            .num.total    { color: #e6edf3; }
            .badge { display: inline-block; border-radius: 4px; padding: 2px 10px;
                     font-size: 12px; font-weight: 600; text-transform: uppercase; }
            .badge.pass { background: #1a4731; color: #3fb950; border: 1px solid #238636; }
            .badge.fail { background: #3d1c1e; color: #f85149; border: 1px solid #da3633; }
            table { width: 100%; border-collapse: collapse; background: #161b22;
                    border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
            thead th { background: #21262d; color: #8b949e; font-weight: 600; font-size: 12px;
                       text-transform: uppercase; letter-spacing: .4px; padding: 10px 12px; text-align: left; }
            tbody td { padding: 8px 12px; border-top: 1px solid #21262d; vertical-align: top; }
            tbody tr:hover td { background: #1c2128; }
            td.desc { color: #8b949e; font-size: 12px; max-width: 340px; }
            .sev { display: inline-block; border-radius: 3px; padding: 1px 7px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
            .sev.critical { background: #3d1c1e; color: #f85149; border: 1px solid #da3633; }
            .sev.high     { background: #2e2009; color: #e3b341; border: 1px solid #9e6a03; }
            .sev.medium   { background: #2e2009; color: #d29922; border: 1px solid #9e6a03; }
            .sev.low      { background: #0d1926; color: #388bfd; border: 1px solid #1f6feb; }
            a { color: #58a6ff; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .section-header { display: flex; align-items: center; gap: 12px; }
          </style>
          </head>
          <body>
          <h1>🛡 Prisma Cloud Scan Report</h1>
          <div class="meta">
            <strong>Image:</strong> <code>${IMAGE}</code> &nbsp;|&nbsp;
            <strong>Branch:</strong> <code>${{ github.ref_name }}</code> &nbsp;|&nbsp;
            <strong>Scan time:</strong> ${SCAN_TIME} &nbsp;|&nbsp;
            <strong>Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">#${{ github.run_id }}</a>
            $([ "$CONSOLE_LINK" != "—" ] && echo "&nbsp;|&nbsp; ${CONSOLE_LINK}")
          </div>

          <h2><div class="section-header">Vulnerabilities &nbsp; ${VULN_BADGE}</div></h2>
          <div class="cards">
            <div class="card"><div class="num critical">${VCRIT}</div><div class="label">Critical</div></div>
            <div class="card"><div class="num high">${VHIGH}</div><div class="label">High</div></div>
            <div class="card"><div class="num medium">${VMED}</div><div class="label">Medium</div></div>
            <div class="card"><div class="num low">${VLOW}</div><div class="label">Low</div></div>
            <div class="card"><div class="num total">${VTOT}</div><div class="label">Total</div></div>
          </div>
          $(if [ -n "$VULN_ROWS" ]; then cat <<VTABLE
          <table>
            <thead><tr><th>CVE</th><th>Severity</th><th>Package</th><th>Version</th><th>Status</th><th>Fix</th><th>Description</th></tr></thead>
            <tbody>${VULN_ROWS}</tbody>
          </table>
          VTABLE
          fi)

          <h2><div class="section-header">Compliance &nbsp; ${COMP_BADGE}</div></h2>
          <div class="cards">
            <div class="card"><div class="num critical">${CCRIT}</div><div class="label">Critical</div></div>
            <div class="card"><div class="num high">${CHIGH}</div><div class="label">High</div></div>
            <div class="card"><div class="num medium">${CMED}</div><div class="label">Medium</div></div>
            <div class="card"><div class="num low">${CLOW}</div><div class="label">Low</div></div>
            <div class="card"><div class="num total">${CTOT}</div><div class="label">Total</div></div>
          </div>
          $(if [ -n "$COMP_ROWS" ]; then cat <<CTABLE
          <table>
            <thead><tr><th>ID</th><th>Severity</th><th>Title</th><th>Description</th></tr></thead>
            <tbody>${COMP_ROWS}</tbody>
          </table>
          CTABLE
          fi)

          </body>
          </html>
          HTML

      - name: '[8/8] Upload scan results'
        if: ${{ !cancelled() }}
        run: |
          mkdir -p scan-results
          for f in scan_report.md scan_report.html pcc_scan_results.json twistcli_output.txt; do
            [ -f "$f" ] && mv "$f" scan-results/
          done

      - name: Upload artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-cloud-scan-results
          path: scan-results/
          retention-days: 30
