# This workflow integrates a collection of open source static analysis tools
# with GitHub code scanning. For documentation, or to provide feedback, visit
# https://aka.ms/MicrosoftSecurityDevOps
name: OSSAR

on:
  push:
    branches: [ "master", "rc", "release" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]
  schedule:
    - cron: '42 13 * * 4'

permissions:
  contents: read

jobs:
  OSSAR-Scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: windows-latest

    steps:
    - name: Support longpaths
      run: |
        git config --system core.longpaths true
        New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
          -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

    - name: Checkout repository
      uses: actions/checkout@v4

      # Run open source static analysis tools
      # binskim is excluded because it requires compiled binaries (.dll/.exe)
      # which are not available in a source-only checkout.
    - name: Run Microsoft Security DevOps
      uses: microsoft/security-devops-action@v1
      id: msdo
      with:
        tools: eslint,templateanalyzer,trivy

      # Upload results to the Security tab
    - name: Upload MSDO results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.msdo.outputs.sarifFile }}
